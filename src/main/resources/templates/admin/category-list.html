<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Manage Categories</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">Manage Categories</h2>
        <a th:href="@{/admin/categories/create}" class="btn btn-primary fw-bold shadow-sm">
            <i class="bi bi-plus-circle"></i> Add New Category
        </a>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-4">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Category Name</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="category : ${categories}">
                    <td th:text="${category.id}">1</td>
                    <td class="fw-bold" th:text="${category.name}">Category Name</td>
                </tr>
                <tr th:if="${categories.empty}">
                    <td colspan="2" class="text-center text-muted m-3">
                        No categories available. Start by adding one!
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
