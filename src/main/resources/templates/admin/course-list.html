<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Manage Courses</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">Manage Courses</h2>
        <a th:href="@{/admin/courses/create}" class="btn btn-primary fw-bold shadow-sm">
            <i class="bi bi-plus-circle"></i> Add New Course
        </a>
    </div>

    <div class="table-responsive bg-white rounded-3 shadow-sm p-4">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Image</th>
                    <th>Course Name</th>
                    <th>Category</th>
                    <th>Lecturer</th>
                    <th>Credits</th>
                    <th class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="course : ${courses}">
                    <td th:text="${course.id}">1</td>
                    <td>
                        <img th:if="${!#strings.isEmpty(course.image)}" th:src="${course.image}" class="img-thumbnail" style="width: 60px; height: 40px; object-fit: cover;" alt="Course Image">
                    </td>
                    <td class="fw-bold" th:text="${course.name}">Course Name</td>
                    <td th:text="${course.category?.name}">Category</td>
                    <td th:text="${course.lecturer}">Lecturer</td>
                    <td th:text="${course.credits}">3</td>
                    <td class="text-center">
                        <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure you want to delete this course?')"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                <tr th:if="${courses.empty}">
                    <td colspan="7" class="text-center text-muted m-3">
                        No courses available. Start by adding one!
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
