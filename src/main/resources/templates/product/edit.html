<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Edit product</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">

    <h3 class="mt-3">Chỉnh sửa sản phẩm</h3>

    <form th:action="@{/products/edit}" th:object="${product}"
          method="post" class="form" enctype="multipart/form-data">

        <!-- ID ẩn -->
        <input type="hidden" th:field="*{id}"/>

        <!-- NAME -->
        <div class="form-group">
            <label for="name">Name</label>
            <input class="form-control" type="text" th:field="*{name}"
                   id="name" placeholder="product Name">
            <div class="alert alert-warning"
                 th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <!-- PRICE -->
        <div class="form-group">
            <label for="price">Price:</label>
            <input class="form-control" type="number" th:field="*{price}"
                   id="price" placeholder="price">
            <div class="alert alert-warning"
                 th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <!-- IMAGE hiện tại -->
        <div class="form-group mb-2">
            <label>Ảnh hiện tại:</label><br/>
            <img th:if="${product.image != null}"
                 th:src="@{/images/} + ${product.image}"
                 height="80" alt="current image"
                 class="img-thumbnail"/>
            <span th:if="${product.image == null}" class="text-muted">Chưa có ảnh</span>
        </div>

        <!-- IMAGE mới (tuỳ chọn) -->
        <div class="form-group">
            <label for="image">Đổi ảnh (để trống nếu không thay đổi):</label>
            <input class="form-control" type="file" id="image" name="imageProduct"
                   accept="image/png,image/jpeg">
        </div>

        <!-- CATEGORY -->
        <div class="form-group">
            <label for="category" class="form-label">Category:</label>
            <select th:field="*{category.id}" class="form-control" id="category">
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}"></option>
            </select>
            <div class="alert alert-warning"
                 th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
        </div>

        <input type="submit" class="btn btn-primary mt-2" value="Save Changes">
        <a th:href="@{/products}" class="btn btn-secondary mt-2">Cancel</a>
    </form>

</div>
</body>
</html>
