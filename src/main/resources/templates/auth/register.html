<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Register - Courses</title>
</head>
<body>
<div layout:fragment="content">
    <div class="auth-form-container mt-5">
        <h3 class="text-center mb-4 text-primary fw-bold">Create Account</h3>
        
        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">
            Error message
        </div>

        <form th:action="@{/register}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Register as Student</button>
        </form>

        <div class="text-center mt-3">
            <small>Already have an account? <a th:href="@{/login}" class="text-decoration-none">Login</a></small>
        </div>
    </div>
</div>
</body>
</html>
