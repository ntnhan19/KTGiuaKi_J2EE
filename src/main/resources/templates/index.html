<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Lab03 - Book Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #1a1a2e;
            --paper: #f7f3ee;
            --accent: #c8533a;
            --gold: #d4a847;
            --muted: #7a7068;
        }

        body {
            background: var(--paper);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 20%, rgba(200,83,58,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 80% 80%, rgba(212,168,71,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Decorative vertical lines */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 8%; width: 1px; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(200,83,58,0.15), transparent);
        }

        .hero {
            text-align: center;
            padding: 3rem 2rem;
            position: relative;
            z-index: 1;
            max-width: 560px;
        }

        .badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.35rem 1rem;
            border-radius: 2px;
            margin-bottom: 2rem;
            animation: fadeDown 0.6s ease both;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 6vw, 4.5rem);
            color: var(--ink);
            line-height: 1.1;
            margin-bottom: 1.2rem;
            animation: fadeDown 0.6s 0.1s ease both;
        }

        h1 span {
            color: var(--accent);
            position: relative;
        }

        h1 span::after {
            content: '';
            position: absolute;
            bottom: 4px; left: 0; right: 0;
            height: 3px;
            background: var(--gold);
            transform: scaleX(0);
            animation: underlineIn 0.5s 0.8s ease forwards;
        }

        p.subtitle {
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            animation: fadeDown 0.6s 0.2s ease both;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--ink);
            color: #fff;
            text-decoration: none;
            padding: 1rem 2.2rem;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            border-radius: 3px;
            transition: background 0.2s, transform 0.2s;
            animation: fadeUp 0.6s 0.3s ease both;
        }

        .cta:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .cta svg { transition: transform 0.2s; }
        .cta:hover svg { transform: translateX(4px); }

        .stat-row {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 3.5rem;
            padding-top: 2.5rem;
            border-top: 1px solid rgba(26,26,46,0.1);
            animation: fadeUp 0.6s 0.4s ease both;
        }

        .stat { text-align: center; }
        .stat-num {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--ink);
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 0.2rem;
        }

        /* Decorative book icon */
        .book-icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes underlineIn {
            to { transform: scaleX(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="hero">
        <span class="badge">Lab03 · Spring MVC + Thymeleaf</span>
        <span class="book-icon">📚</span>
        <h1>Quản lý <span>Sách</span></h1>
        <p class="subtitle">Ứng dụng quản lý sách đơn giản với Spring Boot, Thymeleaf và Validation.</p>
        <a href="/books" class="cta">
            Xem danh sách sách
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </a>
        <div class="stat-row">
            <div class="stat">
                <div class="stat-num">MVC</div>
                <div class="stat-label">Kiến trúc</div>
            </div>
            <div class="stat">
                <div class="stat-num">CRUD</div>
                <div class="stat-label">Chức năng</div>
            </div>
            <div class="stat">
                <div class="stat-num">Valid</div>
                <div class="stat-label">Kiểm tra</div>
            </div>
        </div>
    </div>
</body>
</html>
