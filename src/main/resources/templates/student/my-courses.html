<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{_layout}">

<head>
    <title>My Courses</title>
</head>

<body>
    <div layout:fragment="content">

        <!-- Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title">My <span>Courses</span></h1>
                <p style="color:var(--text-muted);font-size:0.9rem;margin-top:4px;">All the courses you have enrolled
                    in.</p>
            </div>
            <a th:href="@{/home}" class="btn-primary-custom">
                <i class="bi bi-plus-lg"></i> Explore More
            </a>
        </div>

        <!-- Stats -->
        <div class="my-stats mb-4" th:if="${!enrollments.empty}">
            <div class="my-stat-card">
                <i class="bi bi-bookmark-check-fill stat-ico"></i>
                <div>
                    <div class="stat-num" th:text="${enrollments.size()}">0</div>
                    <div class="stat-lbl">Enrolled</div>
                </div>
            </div>
        </div>

        <!-- Enrolled Grid -->
        <div class="enrolled-grid" th:if="${!enrollments.empty}">
            <div class="enrolled-card" th:each="enrollment, j : ${enrollments}">
                <div class="enrolled-img-wrap">
                    <img th:if="${enrollment.course.image != null and !enrollment.course.image.isEmpty()}"
                        th:src="${enrollment.course.image}" class="enrolled-img" alt="Course"
                        onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=400&q=80'">
                    <div class="enrolled-img-placeholder"
                        th:unless="${enrollment.course.image != null and !enrollment.course.image.isEmpty()}">
                        <i class="bi bi-journal-code"></i>
                    </div>
                    <div class="enrolled-num" th:text="${j.count}">1</div>
                </div>
                <div class="enrolled-body">
                    <div class="enrolled-category" th:text="${enrollment.course.category?.name ?: 'General'}">Category
                    </div>
                    <h5 class="enrolled-title" th:text="${enrollment.course.name}">Course Name</h5>
                    <div class="enrolled-meta">
                        <span><i class="bi bi-person-video3"></i> <span
                                th:text="${enrollment.course.lecturer}">Lecturer</span></span>
                        <span><i class="bi bi-patch-check"></i> <span th:text="${enrollment.course.credits}">3</span>
                            credits</span>
                    </div>
                    <div class="enrolled-footer">
                        <div class="enrolled-date">
                            <i class="bi bi-calendar3"></i>
                            Enrolled: <span
                                th:text="${#temporals.format(enrollment.enrollDate, 'dd/MM/yyyy')}">--/--/----</span>
                        </div>
                        <div class="enrolled-badge"><i class="bi bi-check2-circle"></i> Active</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="empty-state" th:if="${enrollments.empty}">
            <div class="empty-state-icon"><i class="bi bi-bookmark-x"></i></div>
            <h4 style="font-weight:700;color:var(--text-primary);">No enrolled courses yet</h4>
            <p style="color:var(--text-muted);">Browse available courses and start learning today!</p>
            <a th:href="@{/home}" class="btn-primary-custom mt-2">
                <i class="bi bi-compass"></i> Browse Courses
            </a>
        </div>

    </div>

    <th:block layout:fragment="head-extra">
        <style>
            .my-stats {
                display: flex;
                gap: 16px;
            }

            .my-stat-card {
                background: white;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 16px 24px;
                display: flex;
                align-items: center;
                gap: 14px;
                box-shadow: var(--shadow-sm);
            }

            .stat-ico {
                font-size: 1.5rem;
                color: var(--primary);
            }

            .stat-num {
                font-size: 1.6rem;
                font-weight: 800;
                color: var(--text-primary);
                line-height: 1;
            }

            .stat-lbl {
                font-size: 0.75rem;
                color: var(--text-muted);
                font-weight: 500;
                margin-top: 2px;
            }

            .enrolled-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 20px;
            }

            .enrolled-card {
                background: white;
                border-radius: 16px;
                border: 1px solid var(--border);
                overflow: hidden;
                box-shadow: var(--shadow-sm);
                transition: all 0.3s;
            }

            .enrolled-card:hover {
                transform: translateY(-4px);
                box-shadow: var(--shadow-lg);
            }

            .enrolled-img-wrap {
                position: relative;
                height: 160px;
            }

            .enrolled-img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .enrolled-img-placeholder {
                width: 100%;
                height: 100%;
                background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--primary-light);
                font-size: 2.5rem;
            }

            .enrolled-num {
                position: absolute;
                top: 10px;
                right: 10px;
                background: rgba(0, 0, 0, 0.5);
                backdrop-filter: blur(4px);
                color: white;
                width: 26px;
                height: 26px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.75rem;
                font-weight: 700;
            }

            .enrolled-body {
                padding: 16px;
            }

            .enrolled-category {
                font-size: 0.72rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: var(--primary);
                margin-bottom: 6px;
            }

            .enrolled-title {
                font-size: 0.95rem;
                font-weight: 700;
                color: var(--text-primary);
                margin-bottom: 10px;
                line-height: 1.4;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            .enrolled-meta {
                display: flex;
                gap: 14px;
                flex-wrap: wrap;
                font-size: 0.8rem;
                color: var(--text-secondary);
                margin-bottom: 14px;
            }

            .enrolled-meta span {
                display: flex;
                align-items: center;
                gap: 4px;
            }

            .enrolled-footer {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding-top: 10px;
                border-top: 1px solid var(--surface3);
            }

            .enrolled-date {
                font-size: 0.78rem;
                color: var(--text-muted);
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .enrolled-badge {
                font-size: 0.75rem;
                font-weight: 600;
                color: var(--accent2);
                background: rgba(16, 185, 129, 0.1);
                border-radius: 20px;
                padding: 3px 10px;
                display: flex;
                align-items: center;
                gap: 4px;
            }
        </style>
    </th:block>
</body>

</html>
