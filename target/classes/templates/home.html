<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{_layout}">
<head>
    <title>Home - Courses</title>
</head>
<body>
<div layout:fragment="content">

    <div class="row mb-4">
        <div class="col-12 text-center">
            <h1 class="fw-bold text-primary">Explore Our Courses</h1>
            <p class="text-muted">Find the best courses and enroll to upgrade your skills.</p>
        </div>
    </div>

    <!-- Alerts -->
    <div th:if="${param.enrollSuccess}" class="alert alert-success alert-dismissible fade show" role="alert">
        <strong>Success!</strong> Enrolled carefully!
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${param.enrollError}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong>Error!</strong> Could not enroll. You might already be enrolled.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <!-- Loop over courses -->
        <div class="col" th:each="course : ${courses}">
            <div class="card h-100 course-card shadow-sm">
                <img th:if="${!#strings.isEmpty(course.image)}" th:src="${course.image}" class="card-img-top course-image" alt="Course Image" onerror="this.src='https://via.placeholder.com/800x400?text=No+Image'">
                <img th:unless="${!#strings.isEmpty(course.image)}" src="https://via.placeholder.com/800x400?text=Course" class="card-img-top course-image" alt="Placeholder">
                
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="badge bg-secondary" th:text="${course.category?.name}">Category</span>
                        <span class="badge bg-info text-dark"><i class="bi bi-star-fill text-warning"></i> <span th:text="${course.credits}">3</span> Credits</span>
                    </div>
                    <h5 class="card-title fw-bold" th:text="${course.name}">Course Name</h5>
                    <p class="card-text text-muted small mb-3"><i class="bi bi-person-video3"></i> Lecturer: <strong th:text="${course.lecturer}">John Doe</strong></p>
                    
                    <div class="mt-auto">
                        <form th:action="@{/enroll/{id}(id=${course.id})}" method="post" sec:authorize="hasRole('STUDENT')">
                            <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm">
                                <i class="bi bi-bookmark-plus"></i> Enroll Now
                            </button>
                        </form>
                        <div sec:authorize="isAnonymous()">
                            <a th:href="@{/login}" class="btn btn-outline-primary w-100">Login to Enroll</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:if="${courses.size() == 0}" class="text-center my-5">
        <h4 class="text-muted">No courses found <i class="bi bi-emoji-frown"></i></h4>
    </div>

    <!-- Pagination -->
    <nav aria-label="Page navigation" class="mt-5" th:if="${totalPages > 0}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${currentPage - 1}, keyword=${keyword})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link" th:href="@{/home(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${currentPage + 1}, keyword=${keyword})}">Next</a>
            </li>
        </ul>
    </nav>

</div>
</body>
</html>
