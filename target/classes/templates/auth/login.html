<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <title>Login - Courses</title>
</head>
<body>
<div layout:fragment="content">
    <div class="auth-form-container mt-5">
        <h3 class="text-center mb-4 text-primary fw-bold">Welcome Back</h3>
        
        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success" role="alert">
            You have been logged out.
        </div>
        <div th:if="${param.registered}" class="alert alert-success" role="alert">
            Registration successful. Please login.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">Login</button>
        </form>

        <div class="text-center text-muted mb-3">OR</div>
        
        <!-- Google OAuth2 Placeholder / Actual implementation depends on application.properties -->
        <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-danger w-100 fw-bold mb-3">
            <i class="bi bi-google"></i> Login with Google
        </a>

        <div class="text-center">
            <small>Don't have an account? <a th:href="@{/register}" class="text-decoration-none">Register here</a></small>
        </div>
    </div>
</div>
</body>
</html>
